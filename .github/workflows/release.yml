name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4

      - name: Restore signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          chmod 600 "$RUNNER_TEMP/release.jks"
          cat > "$RUNNER_TEMP/signing.properties" <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Check version
        run: |
          version=$(sed -n "s/.*versionName '\([^']*\)'.*/\1/p" app/build.gradle)
          echo "VERSION=$version" >> "$GITHUB_ENV"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            test "v$version" = "$GITHUB_REF_NAME"
          fi

      - name: Build signed APK
        env:
          APP_SIGNING_PROPERTIES: ${{ runner.temp }}/signing.properties
        run: ./gradlew --no-daemon clean assembleRelease lintRelease

      - name: Verify and package APK
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk
          cp app/build/outputs/apk/release/app-release.apk "per-app-color-inversion-$VERSION.apk"
          sha256sum "per-app-color-inversion-$VERSION.apk" > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: signed-release-${{ env.VERSION }}
          path: |
            per-app-color-inversion-${{ env.VERSION }}.apk
            SHA256SUMS

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "per-app-color-inversion-$VERSION.apk" \
            SHA256SUMS \
            --verify-tag \
            --generate-notes \
            --title "Per-App Color Inversion $VERSION"
